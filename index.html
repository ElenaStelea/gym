<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Program Sală</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e; --card: #161616; --card2: #1e1e1e;
    --accent: #e8ff47; --accent2: #ff6b35;
    --text: #f0f0f0; --muted: #666; --border: #2a2a2a;
    --done: #2a3a1a; --done-border: #5a8a2a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; padding: 16px; }
  header { text-align: center; padding: 24px 0 20px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 2.8rem; letter-spacing: 3px; color: var(--accent); line-height: 1; }
  header p { color: var(--muted); font-size: 0.8rem; margin-top: 4px; letter-spacing: 1px; text-transform: uppercase; }
  .tabs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 20px; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { flex-shrink: 0; background: var(--card); border: 1px solid var(--border); color: var(--muted); padding: 8px 14px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.78rem; font-weight: 600; cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.5px; }
  .tab.active { background: var(--accent); color: #0e0e0e; border-color: var(--accent); }
  .tab:hover:not(.active) { border-color: var(--accent); color: var(--accent); }
  .day { display: none; }
  .day.active { display: block; }
  .day-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 2px; margin-bottom: 4px; }
  .day-subtitle { color: var(--muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 18px; }
  .day-progress { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; margin-bottom: 18px; display: flex; align-items: center; gap: 12px; }
  .progress-bar-wrap { flex: 1; background: var(--border); border-radius: 4px; height: 6px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.3s; }
  .progress-label { font-size: 0.75rem; color: var(--muted); min-width: 40px; text-align: right; }
  .cycle-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--card2); border: 1px solid var(--accent2); border-radius: 20px; padding: 4px 12px; font-size: 0.72rem; color: var(--accent2); margin-bottom: 18px; text-transform: uppercase; letter-spacing: 0.5px; }
  .exercise { background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
  .exercise.completed { background: var(--done); border-color: var(--done-border); }
  .exercise-header { display: flex; align-items: center; gap: 12px; padding: 14px 16px; cursor: pointer; }
  .ex-num { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; color: var(--accent); min-width: 20px; }
  .ex-name { flex: 1; font-weight: 600; font-size: 0.95rem; }
  .ex-scheme { color: var(--muted); font-size: 0.78rem; font-weight: 500; }
  .ex-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .exercise.completed .ex-check { background: var(--done-border); border-color: var(--done-border); }
  .checkmark { display: none; font-size: 0.7rem; }
  .exercise.completed .checkmark { display: block; }
  .sets-table { padding: 0 16px 14px; display: none; }
  .exercise.open .sets-table { display: block; }
  .sets-header { display: grid; grid-template-columns: 36px 1fr 1fr 36px 28px; gap: 6px; font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; padding-bottom: 6px; border-bottom: 1px solid var(--border); margin-bottom: 6px; }
  .set-row { display: grid; grid-template-columns: 36px 1fr 1fr 36px 28px; gap: 6px; align-items: center; padding: 4px 0; }
  .set-label { font-size: 0.75rem; color: var(--muted); font-weight: 600; }
  .set-input { background: var(--card2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.85rem; padding: 5px 4px; width: 100%; text-align: center; }
  .set-input:focus { outline: none; border-color: var(--accent); }
  .set-done-btn { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); cursor: pointer; padding: 5px 2px; font-size: 0.75rem; transition: all 0.2s; width: 100%; }
  .set-done-btn.done { background: var(--done-border); border-color: var(--done-border); color: white; }
  .set-del-btn { background: none; border: none; color: #444; cursor: pointer; font-size: 1rem; padding: 2px; line-height: 1; transition: color 0.2s; }
  .set-del-btn:hover { color: var(--accent2); }
  .add-set-btn { display: flex; align-items: center; justify-content: center; gap: 6px; background: none; border: 1px dashed var(--border); border-radius: 8px; color: var(--muted); cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.78rem; padding: 7px 12px; margin-top: 8px; width: 100%; transition: all 0.2s; }
  .add-set-btn:hover { border-color: var(--accent); color: var(--accent); }
  .progression-note { background: var(--card2); border-left: 3px solid var(--accent); border-radius: 0 8px 8px 0; padding: 10px 14px; margin: 0 16px 14px; font-size: 0.78rem; color: var(--muted); line-height: 1.6; display: none; }
  .exercise.open .progression-note { display: block; }
  .reset-btn { display: block; width: 100%; margin-top: 24px; padding: 12px; background: none; border: 1px solid var(--border); border-radius: 10px; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 0.8rem; cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 1px; }
  .reset-btn:hover { border-color: var(--accent2); color: var(--accent2); }
</style>
</head>
<body>
<header>
  <h1>Program Sală</h1>
  <p>5 zile · Upper focus · Bench progression</p>
</header>
<div class="tabs">
  <button class="tab active" onclick="switchDay(0)">Z1 Upper A</button>
  <button class="tab" onclick="switchDay(1)">Z2 Lower A</button>
  <button class="tab" onclick="switchDay(2)">Z3 Upper B</button>
  <button class="tab" onclick="switchDay(3)">Z4 Lower B</button>
  <button class="tab" onclick="switchDay(4)">Z5 Upper C</button>
</div>
<div id="days-container"></div>

<script>
const DAYS = [
  {
    title:"Ziua 1 – Upper A", subtitle:"Bench focus · Piept · Triceps · Umeri",
    badge:"🔁 Ciclu 1 — adaugă 2.5kg după ce termini toate seturile",
    exercises:[
      {name:"Bench Press",scheme:"4x8 → 4x6 → 4x3 → top",note:"<strong style='color:var(--accent)'>Progresie ciclu 1:</strong><br>4x8 → 47.5 / 50 / 52.5 / 55 kg<br>4x6 → 55 / 57.5 / 60 / 62.5 kg<br>4x3 → 62.5 / 65 / 67.5 / 70 kg<br>Top set 1x3 → 70 / 72.5 / 75 kg<br><span style='color:var(--accent2)'>Ciclu 2: tot +2.5kg</span>",sets:[{kg:"47.5",reps:"8"},{kg:"50",reps:"8"},{kg:"52.5",reps:"8"},{kg:"55",reps:"8"}]},
      {name:"Incline Dumbbell Press",scheme:"4x8",note:"Începe cu 20-22kg/ganteră. Crește cu 2kg când faci 4x8 curat.",sets:[{kg:"20",reps:"8"},{kg:"20",reps:"8"},{kg:"22",reps:"8"},{kg:"22",reps:"8"}]},
      {name:"Chest Fly",scheme:"3x12",note:"",sets:[{kg:"14",reps:"12"},{kg:"14",reps:"12"},{kg:"16",reps:"12"}]},
      {name:"Overhead Triceps Ext",scheme:"4x10",note:"",sets:[{kg:"20",reps:"10"},{kg:"20",reps:"10"},{kg:"22.5",reps:"10"},{kg:"22.5",reps:"10"}]},
      {name:"Lateral Raises",scheme:"4x12",note:"",sets:[{kg:"8",reps:"12"},{kg:"8",reps:"12"},{kg:"10",reps:"12"},{kg:"10",reps:"12"}]},
      {name:"Face Pulls",scheme:"3x15",note:"",sets:[{kg:"15",reps:"15"},{kg:"15",reps:"15"},{kg:"17.5",reps:"15"}]}
    ]
  },
  {
    title:"Ziua 2 – Lower A", subtitle:"Quad focus · Squat principal", badge:"",
    exercises:[
      {name:"Squat",scheme:"4x6 → 4x3 → top",note:"<strong style='color:var(--accent)'>Progresie ciclu 1:</strong><br>4x6 → 75 / 80 / 85 / 87.5 kg<br>4x3 → 87.5 / 90 / 92.5 / 95 kg<br>Top set 1x3 → 97.5 / 100 kg<br><span style='color:var(--accent2)'>Ciclu 2: tot +2.5kg</span>",sets:[{kg:"75",reps:"6"},{kg:"80",reps:"6"},{kg:"85",reps:"6"},{kg:"87.5",reps:"6"}]},
      {name:"Bulgarian Split Squat",scheme:"3x8/picior",note:"",sets:[{kg:"16",reps:"8"},{kg:"18",reps:"8"},{kg:"18",reps:"8"}]},
      {name:"Leg Press",scheme:"3x10",note:"",sets:[{kg:"120",reps:"10"},{kg:"130",reps:"10"},{kg:"140",reps:"10"}]},
      {name:"Extensii (Leg Extension)",scheme:"4x10",note:"",sets:[{kg:"40",reps:"10"},{kg:"45",reps:"10"},{kg:"45",reps:"10"},{kg:"50",reps:"10"}]},
      {name:"Leg Curls",scheme:"3x12",note:"",sets:[{kg:"35",reps:"12"},{kg:"35",reps:"12"},{kg:"40",reps:"12"}]}
    ]
  },
  {
    title:"Ziua 3 – Upper B", subtitle:"Spate · Biceps · Umeri · Close Grip", badge:"",
    exercises:[
      {name:"Chin Ups",scheme:"4x8",note:"Greutate corporală. Dacă faci 4x8 ușor, adaugă 2.5-5kg cu centură.",sets:[{kg:"0",reps:"8"},{kg:"0",reps:"8"},{kg:"0",reps:"8"},{kg:"0",reps:"8"}]},
      {name:"Rows cu Bara",scheme:"4x8",note:"Ai lucrat cu 50kg. Progresie: 50 / 52.5 / 55 / 57.5 în cicluri.",sets:[{kg:"50",reps:"8"},{kg:"50",reps:"8"},{kg:"52.5",reps:"8"},{kg:"52.5",reps:"8"}]},
      {name:"Close Grip Bench",scheme:"4x6",note:"<strong style='color:var(--accent)'>Progresie ciclu 1:</strong><br>40 / 42.5 / 45 / 47.5 kg<br>Ciclu 2: 42.5 / 45 / 47.5 / 50 kg<br>Ajută direct bench-ul principal!",sets:[{kg:"40",reps:"6"},{kg:"42.5",reps:"6"},{kg:"45",reps:"6"},{kg:"47.5",reps:"6"}]},
      {name:"Rear Delt Fly",scheme:"3x15",note:"",sets:[{kg:"8",reps:"15"},{kg:"8",reps:"15"},{kg:"10",reps:"15"}]},
      {name:"Hammer Curls",scheme:"3x12",note:"",sets:[{kg:"12",reps:"12"},{kg:"12",reps:"12"},{kg:"14",reps:"12"}]},
      {name:"Lateral Raises",scheme:"3x15",note:"",sets:[{kg:"8",reps:"15"},{kg:"8",reps:"15"},{kg:"10",reps:"15"}]}
    ]
  },
  {
    title:"Ziua 4 – Lower B", subtitle:"Glute & Posterior focus", badge:"",
    exercises:[
      {name:"Romanian DLS",scheme:"4x6 → progresie",note:"<strong style='color:var(--accent)'>Progresie ciclu 1:</strong><br>4x6 → 80 / 82.5 / 85 / 87.5 kg<br>4x5 → 87.5 / 90 / 92.5 / 95 kg<br>Ciclu 2: +2.5kg peste tot",sets:[{kg:"80",reps:"6"},{kg:"82.5",reps:"6"},{kg:"85",reps:"6"},{kg:"87.5",reps:"6"}]},
      {name:"Hip Thrust",scheme:"4x10",note:"",sets:[{kg:"80",reps:"10"},{kg:"90",reps:"10"},{kg:"100",reps:"10"},{kg:"100",reps:"10"}]},
      {name:"Reverse Lunges",scheme:"3x8/picior",note:"Ai notat să faci cu 26kg gantere. Dacă e prea ușor, treci la bara.",sets:[{kg:"26",reps:"8"},{kg:"26",reps:"8"},{kg:"26",reps:"8"}]},
      {name:"Lying Leg Curls",scheme:"3x10",note:"",sets:[{kg:"35",reps:"10"},{kg:"40",reps:"10"},{kg:"40",reps:"10"}]},
      {name:"Abductor / Kickbacks",scheme:"3x12",note:"",sets:[{kg:"50",reps:"12"},{kg:"55",reps:"12"},{kg:"55",reps:"12"}]}
    ]
  },
  {
    title:"Ziua 5 – Upper C", subtitle:"OHP principal · Umeri · Trapez · Spate",
    badge:"💡 OHP crește bench-ul indirect — progresiează serios",
    exercises:[
      {name:"Overhead Press (Bara)",scheme:"4x6 → progresie",note:"<strong style='color:var(--accent)'>Progresie ciclu 1:</strong><br>4x6 → 35 / 37.5 / 40 / 42.5 kg<br>4x5 → 42.5 / 45 / 47.5 / 50 kg<br>Ciclu 2: +2.5kg tot",sets:[{kg:"35",reps:"6"},{kg:"37.5",reps:"6"},{kg:"40",reps:"6"},{kg:"42.5",reps:"6"}]},
      {name:"Incline Bench / DB Press",scheme:"3x10",note:"",sets:[{kg:"22",reps:"10"},{kg:"22",reps:"10"},{kg:"24",reps:"10"}]},
      {name:"Tracțiuni (Pronație)",scheme:"4x8",note:"Greutate corporală. Adaugă kg cu centură când e ușor.",sets:[{kg:"0",reps:"8"},{kg:"0",reps:"8"},{kg:"0",reps:"8"},{kg:"0",reps:"8"}]},
      {name:"Shrugs (Bara / Gantere)",scheme:"4x12",note:"Trapez — exercițiu principal. Hold 1-2 sec sus.",sets:[{kg:"60",reps:"12"},{kg:"70",reps:"12"},{kg:"70",reps:"12"},{kg:"80",reps:"12"}]},
      {name:"Lateral Raises",scheme:"4x15",note:"",sets:[{kg:"8",reps:"15"},{kg:"8",reps:"15"},{kg:"10",reps:"15"},{kg:"10",reps:"15"}]},
      {name:"Triceps Pushdown",scheme:"3x12",note:"",sets:[{kg:"25",reps:"12"},{kg:"27.5",reps:"12"},{kg:"30",reps:"12"}]}
    ]
  }
];

let state = [];

function defaultState() {
  return DAYS.map(day => day.exercises.map(ex => ({
    sets: ex.sets.map(s => ({kg: s.kg, reps: s.reps, done: false}))
  })));
}

function loadState() {
  try {
    const raw = localStorage.getItem('workout_v2');
    if (raw) {
      const parsed = JSON.parse(raw);
      state = DAYS.map((day, di) => day.exercises.map((ex, ei) => {
        const saved = parsed[di] && parsed[di][ei];
        return saved || {sets: ex.sets.map(s => ({kg: s.kg, reps: s.reps, done: false}))};
      }));
    } else { state = defaultState(); }
  } catch(e) { state = defaultState(); }
}

function saveState() {
  localStorage.setItem('workout_v2', JSON.stringify(state));
}

function renderAll() {
  const c = document.getElementById('days-container');
  c.innerHTML = DAYS.map((day, di) => renderDay(day, di)).join('');
}

function renderDay(day, di) {
  const total = day.exercises.length;
  const done = state[di].filter(ex => ex.sets.length > 0 && ex.sets.every(s => s.done)).length;
  const pct = total ? (done/total*100) : 0;
  return `<div class="day${di===0?' active':''}" id="day${di}">
    <div class="day-title">${day.title}</div>
    <div class="day-subtitle">${day.subtitle}</div>
    <div class="day-progress">
      <span style="font-size:0.75rem;color:var(--muted)">Progres</span>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="prog${di}" style="width:${pct}%"></div></div>
      <span class="progress-label" id="prog${di}-label">${done}/${total}</span>
    </div>
    ${day.badge ? `<div class="cycle-badge">${day.badge}</div>` : ''}
    <div id="exercises-${di}">${day.exercises.map((ex,ei) => renderExercise(ex,di,ei)).join('')}</div>
    <button class="reset-btn" onclick="resetDay(${di})">Reset ziua ${di+1}</button>
  </div>`;
}

function renderExercise(ex, di, ei) {
  const exState = state[di][ei];
  const allDone = exState.sets.length > 0 && exState.sets.every(s => s.done);
  return `<div class="exercise${allDone?' completed':''}" id="ex-${di}-${ei}">
    <div class="exercise-header" onclick="toggleEx(${di},${ei})">
      <span class="ex-num">${ei+1}</span>
      <span class="ex-name">${ex.name}</span>
      <span class="ex-scheme">${ex.scheme}</span>
      <div class="ex-check"><span class="checkmark">✓</span></div>
    </div>
    ${ex.note ? `<div class="progression-note">${ex.note}</div>` : ''}
    <div class="sets-table">
      <div class="sets-header"><span>Set</span><span>Kg</span><span>Reps</span><span></span><span></span></div>
      <div id="sets-${di}-${ei}">${exState.sets.map((s,si) => renderSetRow(di,ei,si,s)).join('')}</div>
      <button class="add-set-btn" onclick="addSet(${di},${ei})">＋ Adaugă set</button>
    </div>
  </div>`;
}

function renderSetRow(di, ei, si, s) {
  return `<div class="set-row" id="row-${di}-${ei}-${si}">
    <span class="set-label">S${si+1}</span>
    <input class="set-input" type="number" value="${s.kg}" placeholder="kg" oninput="updateSet(${di},${ei},${si},'kg',this.value)">
    <input class="set-input" type="number" value="${s.reps}" placeholder="reps" oninput="updateSet(${di},${ei},${si},'reps',this.value)">
    <button class="set-done-btn${s.done?' done':''}" onclick="event.stopPropagation();toggleSetDone(${di},${ei},${si})">✓</button>
    <button class="set-del-btn" onclick="event.stopPropagation();deleteSet(${di},${ei},${si})">✕</button>
  </div>`;
}

function switchDay(n) {
  document.querySelectorAll('.day').forEach((d,i) => d.classList.toggle('active', i===n));
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===n));
}

function toggleEx(di, ei) {
  document.getElementById(`ex-${di}-${ei}`).classList.toggle('open');
}

function updateSet(di, ei, si, field, val) {
  state[di][ei].sets[si][field] = val;
  saveState();
}

function toggleSetDone(di, ei, si) {
  state[di][ei].sets[si].done = !state[di][ei].sets[si].done;
  saveState();
  refreshExercise(di, ei);
  refreshProgress(di);
}

function addSet(di, ei) {
  const sets = state[di][ei].sets;
  const last = sets.length > 0 ? sets[sets.length-1] : {kg:'',reps:''};
  sets.push({kg: last.kg, reps: last.reps, done: false});
  saveState();
  document.getElementById(`sets-${di}-${ei}`).innerHTML = sets.map((s,si) => renderSetRow(di,ei,si,s)).join('');
  refreshExercise(di, ei);
  refreshProgress(di);
}

function deleteSet(di, ei, si) {
  state[di][ei].sets.splice(si, 1);
  saveState();
  document.getElementById(`sets-${di}-${ei}`).innerHTML = state[di][ei].sets.map((s,si2) => renderSetRow(di,ei,si2,s)).join('');
  refreshExercise(di, ei);
  refreshProgress(di);
}

function refreshExercise(di, ei) {
  const el = document.getElementById('ex-'+di+'-'+ei);
  const sets = state[di][ei].sets;
  el.classList.toggle('completed', sets.length > 0 && sets.every(s => s.done));
  sets.forEach(function(s, si) {
    const btn = document.querySelector('#row-'+di+'-'+ei+'-'+si+' .set-done-btn');
    if (btn) btn.classList.toggle('done', s.done);
  });
}

function refreshProgress(di) {
  const total = DAYS[di].exercises.length;
  const done = state[di].filter(ex => ex.sets.length > 0 && ex.sets.every(s => s.done)).length;
  document.getElementById(`prog${di}`).style.width = (total ? done/total*100 : 0) + '%';
  document.getElementById(`prog${di}-label`).textContent = done+'/'+total;
}

function resetDay(di) {
  state[di] = DAYS[di].exercises.map(ex => ({
    sets: ex.sets.map(s => ({kg: s.kg, reps: s.reps, done: false}))
  }));
  saveState();
  document.getElementById(`exercises-${di}`).innerHTML = DAYS[di].exercises.map((ex,ei) => renderExercise(ex,di,ei)).join('');
  refreshProgress(di);
}

loadState();
renderAll();
</script>
</body>
</html>
